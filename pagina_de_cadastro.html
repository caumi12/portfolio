<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Copa do Mundo 2026 – Grupo VIP</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Pacifico&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',Arial,sans-serif;background:#f0f0f0;display:flex;justify-content:center;}
  .page{max-width:420px;width:100%;background:#fff;min-height:100vh;}

  /* HERO */
  .hero{background:#F5E800;position:relative;overflow:hidden;}
  .hero-img{width:100%;display:block;}

  /* FORM BOX */
  .form-box{
    background:#fff;border-radius:22px 22px 0 0;
    margin-top:-20px;padding:24px 20px 28px;
    position:relative;z-index:3;
    box-shadow:0 -4px 20px rgba(0,0,0,0.08);
  }
  .badge-pill{
    display:inline-flex;align-items:center;gap:6px;
    background:#F5E800;color:#1a4d2f;
    font-size:10px;font-weight:900;
    padding:5px 14px;border-radius:200px;
    margin-bottom:16px;
    text-transform:uppercase;letter-spacing:0.08em;
  }
  .form-title{font-size:20px;font-weight:900;color:#1a1a6e;margin-bottom:6px;display:flex;align-items:center;gap:8px;}
  .form-sub{font-size:11px;color:#555;margin-bottom:18px;line-height:1.5;}
  .form-sub strong{color:#1a1a6e;}
  .field-label{font-size:11px;font-weight:700;color:#111;margin-bottom:5px;display:block;}
  .field-input,.field-select{
    width:100%;border:1.5px solid #dde3ec;border-radius:10px;
    padding:10px 13px;font-size:12px;color:#333;margin-bottom:14px;
    outline:none;background:#f8fafc;font-family:'Inter',sans-serif;
    appearance:none;-webkit-appearance:none;
  }
  .select-wrap{position:relative;margin-bottom:14px;}
  .select-wrap .field-select{margin-bottom:0;}
  .select-wrap::after{
    content:"\276F";font-size:10px;color:#666;
    position:absolute;right:13px;top:50%;
    transform:translateY(-50%) rotate(90deg);pointer-events:none;
  }
  .check-row{display:flex;gap:10px;margin-bottom:18px;align-items:flex-start;}
  .check-row input[type=checkbox]{width:16px;height:16px;flex-shrink:0;margin-top:2px;accent-color:#1a6b34;cursor:pointer;}
  .check-row span{font-size:10px;color:#444;line-height:1.55;}
  .btn-cta{
    width:100%;background:#1a6b34;color:#fff;
    font-size:12px;font-weight:900;border:none;border-radius:10px;
    padding:14px;cursor:pointer;text-transform:uppercase;
    letter-spacing:0.1em;font-family:'Inter',sans-serif;
  }
  .btn-cta:hover{background:#155c2a;}

  /* COMO FUNCIONA */
  .como-section{background:#F5E800;}
  .como-img{width:100%;display:block;}
</style>
</head>
